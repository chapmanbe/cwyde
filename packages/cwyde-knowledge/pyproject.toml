[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cwyde-knowledge"
version = "0.1.0"
description = "Clinical NLP knowledge bases for cwyde (lexicons, modifier categories, interaction rules)"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "Brian Chapman", email = "chapmanbe@gmail.com" }]
requires-python = ">=3.11"
dependencies = ["pyyaml>=6.0", "pydantic>=2.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/cwyde_knowledge"]

[tool.hatch.build.targets.wheel.force-include]
"src/cwyde_knowledge/data" = "cwyde_knowledge/data"
