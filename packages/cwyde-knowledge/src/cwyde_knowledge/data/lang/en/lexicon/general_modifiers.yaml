schema_version: 1

# General clinical context modifiers — language-level hedging vocabulary
# applicable across domains (not PE- or pneumonia-specific).
# Source: standard clinical NLP modifier vocabulary; ConText/NegEx literature.

entries:
  # --- DEFINITE_NEGATED_EXISTENCE ---
  - lex: "no"
    direction: forward
    category: DEFINITE_NEGATED_EXISTENCE
    source: general

  # Section-body negation: ": no" / ": none" as FORWARD applies to entities after ":"
  # Counteracts medspaCy's built-in ": no" BACKWARD rule that would consume "No"
  # and prevent it from scoping forward into section bodies.
  - lex: ": no"
    direction: forward
    category: DEFINITE_NEGATED_EXISTENCE
    source: cwyde

  - lex: ": none"
    direction: forward
    category: DEFINITE_NEGATED_EXISTENCE
    source: cwyde

  - lex: no evidence of
    direction: forward
    category: DEFINITE_NEGATED_EXISTENCE
    source: general

  # "No [finding] to suggest [diagnosis]" is a hedged negation: absence of a specific
  # imaging finding rather than direct negation of the diagnosis. This warrants
  # PROBABLE_NEGATED, not DEFINITE_NEGATED ("No pulmonary embolism" is definite;
  # "No filling defect to suggest PE" is indirect/epistemic).
  #
  # Also supersedes the legacy KB cross-sentence regex (\b(without|no)\b[\d\D\s]*to suggest)
  # which used [\d\D\s]* and spanned sentence boundaries. The replacement regex
  # (?i)\bno\b[^\n.!?]+\bto suggest\b stops at sentence-ending punctuation and newlines.
  # The longer match wins medspaCy overlap pruning over the shorter plain 'no' rule.
  - lex: no XYZ to suggest
    direction: forward
    category: PROBABLE_NEGATED_EXISTENCE
    regex: "(?i)\\bno\\b[^\\n.!?]+\\bto suggest\\b"
    source: cwyde

  - lex: without
    direction: forward
    category: DEFINITE_NEGATED_EXISTENCE
    source: general

  - lex: absent
    direction: bidirectional
    category: DEFINITE_NEGATED_EXISTENCE
    source: general

  - lex: negative for
    direction: forward
    category: DEFINITE_NEGATED_EXISTENCE
    source: general

  - lex: free of
    direction: forward
    category: DEFINITE_NEGATED_EXISTENCE
    source: general

  - lex: denied
    direction: forward
    category: DEFINITE_NEGATED_EXISTENCE
    source: general

  - lex: denies
    direction: forward
    category: DEFINITE_NEGATED_EXISTENCE
    source: general

  # --- PROBABLE_NEGATED_EXISTENCE ---
  - lex: unlikely
    direction: bidirectional
    category: PROBABLE_NEGATED_EXISTENCE
    source: general

  - lex: most likely not
    direction: forward
    category: PROBABLE_NEGATED_EXISTENCE
    source: general

  - lex: probably not
    direction: forward
    category: PROBABLE_NEGATED_EXISTENCE
    source: general

  # --- AMBIVALENT_EXISTENCE ---
  - lex: cannot exclude
    direction: forward
    category: AMBIVALENT_EXISTENCE
    source: general

  - lex: cannot be excluded
    direction: forward
    category: AMBIVALENT_EXISTENCE
    source: general

  - lex: equivocal
    direction: bidirectional
    category: AMBIVALENT_EXISTENCE
    source: general

  - lex: indeterminate
    direction: bidirectional
    category: AMBIVALENT_EXISTENCE
    source: general

  # --- PROBABLE_EXISTENCE ---
  # BIDIRECTIONAL: "probable" precedes or follows the finding ("probable PE", "PE, probable")
  - lex: probable
    direction: bidirectional
    category: PROBABLE_EXISTENCE
    source: general

  - lex: probably
    direction: forward
    category: PROBABLE_EXISTENCE
    source: general

  - lex: likely
    direction: forward
    category: PROBABLE_EXISTENCE
    source: general

  - lex: possible
    direction: forward
    category: PROBABLE_EXISTENCE
    source: general

  - lex: possibly
    direction: forward
    category: PROBABLE_EXISTENCE
    source: general

  - lex: suspected
    direction: forward
    category: PROBABLE_EXISTENCE
    source: general

  - lex: consistent with
    direction: forward
    category: PROBABLE_EXISTENCE
    source: general

  - lex: may represent
    direction: forward
    category: PROBABLE_EXISTENCE
    source: general

  - lex: suspicious for
    direction: forward
    category: PROBABLE_EXISTENCE
    source: general

  # --- HISTORICAL ---
